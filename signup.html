<section style="min-height:100vh;display:flex;justify-content:center;align-items:center;">

    <form style="width:100%;max-width:500px;background:white;padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);">

        <h2 style="text-align:center;margin-bottom:20px;">Create Account</h2>

        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>

        <select required>
            <option value="">Select Role</option>
            <option>Patient</option>
            <option>Doctor</option>
        </select>

        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>

        <button type="submit" class="btn" style="width:100%;">
            Sign Up
        </button>

    </form>

</section>
